<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>Manage Reservations</title>

    <style>
        th, td {
            width: 165px;
        }
    </style>

</head>
<body>
<div class="header">
    <h1 class="header-text">Manage Reservations</h1>
    <div class="header-images">
        <a th:href="@{/dashboard_seller}"><img th:src="@{images/home.png}" alt="Home" class="header-icons"></a>
        <a th:href="@{/notifications}"><img th:src="@{images/bell.png}" alt="Bell" class="header-icons"></a>
        <a th:href="@{/sign_in}"><img th:src="@{images/logout.png}" alt="Logout" class="header-icons"></a>
        <img th:src="@{images/roadmap_logo.png}" alt="Team Roadmap Logo" class="header-logo">
    </div>
</div>
<div style="margin: 1%; max-height: 70vh; overflow: auto">
    <table class="bundle-table" th:if="${not#lists.isEmpty(reservations)}">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Price</th>
                <th>Category</th>
                <th>Pickup Window</th>
                <th>Contents</th>
                <th>Allergens</th>
                <th>Collected</th>
                <th>Claim Code</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="reservation : ${reservations}">
                <td th:text="${reservation.customer.dName}">Ex Customer</td>
                <td th:text="${reservation.bundle.price}">Ex Price</td>
                <td th:text="${reservation.bundle.category}">Ex category</td>
                <td th:text="${reservation.bundle.getPickUpWindowAsString()}">Pickup Window</td>
                <td th:text="${reservation.bundle.getContentsAsString()}" style="overflow: auto; max-width: 165px">Ex contents</td>
                <td th:text="${reservation.bundle.getAllergensAsString()}" style="overflow: auto; max-width: 165px">Ex allergens</td>
                <td th:text="${reservation.collected}">Collected</td>
                <td>
                    <form th:action="@{/manage_reservations_seller}" method="post" autocomplete="off">
                        <input class="text-input1" style="width:150px; text-align: center" type="text" id="ClaimCode" name="ClaimCode">
                        <input type="hidden" th:value="${reservation.reservationID}" name="reservationID">
                        <button class="button1" style="width:150px; padding: 10px 5px; margin:5px">Mark Collected</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
<form th:action="@{/dashboard_seller}">
    <button class="button1" style="width:220px; margin: 5px 20px">Return to Dashboard</button>
</form>
</body>
</html>
