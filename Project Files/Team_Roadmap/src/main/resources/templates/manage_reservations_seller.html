<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>Manage Reservations</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">Manage Reservations</h1>
    <img src="../static/roadmap_logo.png" alt="Team Roadmap Logo" class="header-img">
</div>
<div class="box1" style="width: 50%; min-width: 500px">
    <table th:if="${not#lists.isEmpty(reservations)}" style="column-width: 200px">
        <thead>
        <tr>
            <th>Customer Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Pickup Window</th>
            <th>Contents</th>
            <th>Allergens</th>
            <th>Collected</th>
            <th>Claim Code</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="reservation : ${reservations}">
            <td th:text="${reservation.customer.dName}">Ex Customer</td>
            <td th:text="${reservation.bundle.price}">Ex Price</td>
            <td th:text="${reservation.bundle.category}">Ex category</td>
            <td th:text="${reservation.bundle.getPickUpWindowAsString()}">Pickup Window</td>
            <td th:text="${reservation.bundle.getContentsAsString()}">Ex contents</td>
            <td th:text="${reservation.bundle.getAllergensAsString()}">Ex allergens</td>
            <td th:text="${reservation.collected}">Collected</td>
            <td>
                <form th:action="@{/manage_reservations_seller}" method="post">
                    <input class="text-input1" type="text" id="ClaimCode" name="ClaimCode">
                    <input type="hidden" th:value="${reservation.reservationID}" name="reservationID">
                    <button class="button1" style="width:220px">Mark Collected</button>
                </form>
            </td>

        </tr>
        </tbody>
    </table>
</div>
<form th:action="@{/dashboard_seller}">
    <button class="button1" name="back">Back to Dashboard</button>
</form>
</body>
</html>
