<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>Sign In</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">Team Roadmap - Waste Management</h1>
    <img src="../static/roadmap_logo.png" alt="Team Roadmap Logo" class="header-img">
</div>
<div style="display: flex; flex-wrap: wrap">
    <div class="box1">
        <h2>Our Mission</h2>
        <ul>
            <li>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Vivamus sagittis felis purus, ut tincidunt elit condimentum non.</li>
            <li>Cras convallis blandit lorem, non laoreet neque sodales ornare. Ut nec faucibus ligula. </li>
        </ul>
    </div>
    <div class="box1">
        <h2>Sign Up or Login</h2>
        <div class="grid-2-columns">
            <form>
                <label for="username">Username</label>
                <input class="text-input1" type="text" id="username">
                <label for="password">Password</label>
                <input class="text-input1" type="password" id="password">
                <button type="submit" class="button1" style="grid-column: span 2">Login</button>
            </form>
            <form th:action="@{/sign_up_consumer}">
            <button class="button1" style="width:250px">Create Customer Account</button>
            </form>
            <form th:action="@{/sign_up_seller}">
                <button class="button1" style="width:250px">Create Seller Account</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
