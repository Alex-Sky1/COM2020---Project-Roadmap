<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>Sign Up</title>
    <style>
        ::placeholder {
            color: #dbe9ee;
            opacity: 1;
        }

        p {
            height: 30px;
        }

        input {
            height: 30px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 class="header-text">Sign Up - Customer</h1>
    <img th:src="@{images/roadmap_logo.png}" src="/static/images/roadmap_logo.png" alt="Team Roadmap Logo" class="header-logo">
</div>
<div class="box1-parent">
    <form th:action="@{/sign_up_consumer}" method = post autocomplete="off">
        <div class="box1" style="height: 400px; border: none; width: 40%">
            <div class="grid-2-columns" style="row-gap: 4%; margin: 5%; grid-template-columns: 1fr 1fr">
                <label for="fname">First Name(s):</label>
                <input class="text-input1" type="text" id="fname" name="fname">
                <label for="sname">Surname:</label>
                <input class="text-input1" type="text" id="sname" name="sname">
                <label for="dname">Display Name:</label>
                <input class="text-input1" type="text" id="dname" name="dname" style="margin-bottom: 5%">
                <label for="address_line_1"></label>
                <input class="text-input1" type="text" placeholder="Address Line 1" style="grid-column: span 2" id="address_line_1" name="address_line_1">
                <label for="postcode"></label>
                <input class="text-input1" type="text" placeholder="Postcode" id="postcode" name="postcode">
                <label for="county"></label>
                <input class="text-input1" type="text" placeholder="County" id="county" name="county" style="margin-bottom: 5%">
                <input style="height: 20px" type="checkbox" id="accept" name="accept" value="accept">
                <label style="font-size: 15px; height: 20px" for="accept">I accept the terms and conditions and privacy policy</label>
            </div>
        </div>
        <div class="box1" style="height: 400px; border: none; width: 40%">
            <div class="grid-2-columns" style="row-gap: 5%; margin: 5%; grid-template-columns: 1fr 1fr">
                <label for="email">Email Address:</label>
                <input class="text-input1" type="email" id="email" name ="email">
                <label for="phone">Phone Number:</label>
                <input class="text-input1" type="tel" id="phone" name="phone">
                <label for="password1">Password:</label>
                <input class="text-input1" type="password" id="password1" name="password1">
                <label for="password2">Confirm Password:</label>
                <input class="text-input1" type="password" id="password2" name="password2">
                <p th:text="${error}" style="color:red; font-size: 13px; font-weight: bold; grid-column: span 2; text-align: center; margin-bottom: 0"></p>
                <button type="submit" class="button1" style="width:250px; margin-top: 10%">Create Account</button>
            </div>
        </div>
    </form>
</div>
<form th:action="@{/sign_in}">
    <button class="button1" style="width:250px; margin-left: 3%">Return To Login</button>
</form>
<form th:action="@{/tos_consumer}">
    <button class="button1" style="width:250px">Terms and Conditions</button>
</form>
<form th:action="@{/privacy_policy_consumer}">
    <button class="button1" style="width:250px">Privacy Policy</button>
</form>
</body>
</html>
