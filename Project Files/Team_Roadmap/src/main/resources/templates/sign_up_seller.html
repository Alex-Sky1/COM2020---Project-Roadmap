<!DOCTYPE HTML>
<html>
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>Sign Up</title>
    <style>
        ::placeholder {
            color: #dbe9ee;
            opacity: 1;
        }

        p {
            height: 30px;
        }

        input {
            height: 30px;
        }
    </style>
</head>
<body>
<div class="header">
    <h1 class="header-text">Sign Up</h1>
    <img src="../static/roadmap_logo.png" alt="Team Roadmap Logo" class="header-img">
</div>
<div class="box1" style="height: 400px; border: none">
    <div class="grid-2-columns" style="row-gap: 2%">
        <form style="float: left; margin: 3%">
            <p>First Name(s):</p>
            <input class="text-input1" type="text">
            <p>Surname:</p>
            <input class="text-input1" type="text">
            <p>Display Name:</p>
            <input class="text-input1" type="text">
            <input class="text-input1" type="text" placeholder="Address Line 1" style="grid-column: span 2; margin-bottom:2%">
            <input class="text-input1" type="text" placeholder="Postcode">
            <input class="text-input1" type="text" placeholder="County">
        </form>
    </div>
</div>
<div class="box1" style="height: 400px; border: none">
    <div class="grid-2-columns" style="row-gap: 2%">
        <form style="float: left; margin: 3%">
            <p>Email Address:</p>
            <input class="text-input1" type="text">
            <p>Phone Number:</p>
            <input class="text-input1" type="text">
            <p>Password:</p>
            <input class="text-input1" type="password">
            <p>Password:</p>
            <input class="text-input1" type="password">
            <input style="height: 20px" type="checkbox" id="accept" name="accept" value="accept">
            <label style="font-size: 10px; height: 20px" for="accept">I accept the terms and conditions</label>
        </form>
        <button class="button1" style="width:250px">Return To Login</button>
        <button class="button1" style="width:250px">Create Account</button>
    </div>
</div>
</body>
</html>
