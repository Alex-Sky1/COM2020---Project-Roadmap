<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>View Analytics</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">View Analytics</h1>
    <img src="../static/images/roadmap_logo.png" alt="Team Roadmap Logo" class="header-img">
</div>
<div class="analytics-table" style="padding: 1%">
    <div>My Streak</div>
    <div>Bundles Collected</div>
    <div>CO2e Saved</div>
    <div>Badges Collected</div>
    <div style="font-size: 8vmax; background-color: #4a6fa5" th:text="${streak}"></div>
    <div style="font-size: 8vmax; background-color: #4a6fa5" th:text="${collected}"></div>
    <div style="font-size: 8vmax; background-color: #4a6fa5" th:text="${co2_save}"></div>
    <div style="font-size: 8vmax; background-color: #4a6fa5" th:text="${no_badges}"></div>
</div>
<div>
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
    <img src="../static/images/Star.png" alt="Star" style="width: 10%; height: auto; padding: 2%">
</div>
<form th:action="@{/dashboard_consumer}">
    <button class="button1" style="width:250px; margin-left: 5%">Return To Dashboard</button>
</form>
<div class="box1" style="margin: 0 1%; height: 2%; padding: 5px 2%; float: right">
    <p>description of badge:</p>
</div>
</body>
</html>
