<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>View Analytics</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">View Analytics</h1>
    <img th:src="@{images/roadmap_logo.png}" alt="Team Roadmap Logo" class="header-img">
</div>
<div>
    <form>
        <button class="button1" style="width: 20%; padding: 2%; margin: 1% 2%">Sell Through</button>
    </form>
    <form>
        <button class="button1" style="width: 20%; padding: 2%; margin: 1% 2%">Waste Proxy</button>
    </form>
    <form>
        <button class="button1" style="width: 20%; padding: 2%; margin: 1% 2%">Pricing Effectiveness</button>
    </form>
    <form>
        <button class="button1" style="width: 20%; padding: 2%; margin: 1% 2%">Operational Insights</button>
    </form>
</div>
<div style="display: flex; flex-direction: row">
    <div style="width: 15%; padding: 2%; margin: 1% 2%">
        <p>Collected : Expired : No Show </p>
        <p style="margin: 1% 2%" th:text="${sellThrough}"></p>
    </div>
    <p style="width: 15%; padding: 2%; margin: 1% 2%" th:text="${wasteProxy}"></p>
    <p style="width: 15%; padding: 2%; margin: 1% 2%" th:text="${pricingEffectiveness}"></p>
    <p style="width: 15%; padding: 2%; margin: 1% 2%" th:text="${operationalInsights}"></p>
</div>
<form th:action="@{/dashboard_seller}">
    <button class="button1" style="width:250px; margin-left: 5%">Return To Dashboard</button>
</form>
</body>
</html>
