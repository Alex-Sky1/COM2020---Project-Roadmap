<!DOCTYPE HTML>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>View Analytics</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">View Analytics</h1>
    <div class="header-images">
        <a th:href="@{/dashboard_seller}"><img th:src="@{images/home.png}" alt="Home" class="header-icons"></a>
        <a th:href="@{/notifications}"><img th:src="@{images/bell.png}" alt="Bell" class="header-icons"></a>
        <a th:href="@{/sign_in}"><img th:src="@{images/logout.png}" alt="Logout" class="header-icons"></a>
        <img th:src="@{images/roadmap_logo.png}" alt="Team Roadmap Logo" class="header-logo">
    </div>
</div>
<div>
    <button type="button" class="button1" id="sell_through_button" onclick="change_sell_through()" style="width: 20%; padding: 2%; margin: 1% 2%; border: 10px solid cornflowerblue">Sell Through</button>
    <button type="button" class="button1" id="waste_proxy_button" onclick="change_waste_proxy()" style="width: 20%; padding: 2%; margin: 1% 2%">Waste Proxy</button>
    <button type="button" class="button1" id="pricing_effectiveness_button" onclick="change_pricing_effectiveness()" style="width: 20%; padding: 2%; margin: 1% 2%">Pricing Effectiveness</button>
    <button type="button" class="button1" id="operational_insights_button" onclick="change_operational_insights()" style="width: 20%; padding: 2%; margin: 1% 2%">Operational Insights</button>
</div>
<div class="box1" style="width: 90vw">
    <h1 id="title">Sell Through (Collected:Expired:No Show)</h1>
    <p th:text="${sellThrough}" id="sell_through_text" style="display: block">Sell Through</p>
    <p th:text="${wasteProxy}" id="waste_proxy_text" style="display: none">Waste Proxy</p>
    <p th:text="${pricingEffectiveness}" id="pricing_effectiveness_text" style="display: none">Pricing Effectiveness</p>
    <p th:text="${operationalInsights}" id="operational_insights_text" style="display: none">Operational Insights</p>
</div>
<form th:action="@{/dashboard_seller}">
    <button class="button1" style="width:250px; margin-left: 2%">Return To Dashboard</button>
</form>
</body>
<script type="text/javascript" th:src="@{/js/switch_analytic.js}"></script>
</html>
