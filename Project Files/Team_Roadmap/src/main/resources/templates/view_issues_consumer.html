<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../static/styling.css" th:href="@{/styling.css}">
    <title>View Reports</title>
</head>
<body>
<div class="header">
    <h1 class="header-text">View Reports</h1>
    <img th:src="@{images/roadmap_logo.png}" alt="Team Roadmap Logo" class="header-img">
</div>
<div class="box1">
    <table class="bundle-table">
        <thead>
        <tr>
            <th>Your Complaint</th>
            <th>Response</th>
            <th>Date Resolved</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="issue : ${issues}">
            <td th:text="${issue.complaint}">Ex Complaint</td>
            <td th:text="${issue.complaint}">No Response Given</td>
            <td th:text="${issue.getDateString}">Ex Date</td>
        </tr>
        </tbody>
    </table>
</div>
<form th:action="@{/dashboard_consumer}">
<button class="button1" style="width:220px; margin: 5px 20px">Return to Dashboard</button>
</form>

</body>
</html>
